<!DOCTYPE html>
<html lang="en">

<head>
	<base href="/" />
	<script>if (!location.href.endsWith('/') && location.origin !== 'null') location.href += '/'</script>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>MPP Color List</title>
	<link rel="stylesheet" href="css.css">
</head>

<body>
	<h1 class="title">MPP Color List</h1>
	<input id="search" placeholder="Input a color name or hex code..." title="Type something to search...">
	<select id="sort">
		<option value="!invalid">Sort by...</option>
		<option value="name" selected="">Name</option>
		<option value="brightness-ld">Brightness (light to dark)</option>
		<option value="brightness-dl">Brightness (dark to light)</option>
		<option value="hue">Color</option>
		<option value="hue-biased">Color (with brightness bias)</option>
	</select>
	<div id="colors"></div>
	<script src="Color.js"></script>
	<script src="ui.js"></script>
</body>

</html>
